services:
  mongodb:
    image: mongo:8.0
    container_name: interneers_lab_2026_mongodb
    restart: always
    ports:
      - "27019:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mongo-network

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongodb
    networks:
      - mongo-network

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: django-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - mongo-network
    env_file:
    - .env

volumes:
  mongodb_data:

networks:
  mongo-network:
